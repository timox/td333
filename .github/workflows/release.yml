name: release

# Déclenché uniquement quand un tag "vX.Y.Z" est poussé manuellement
# (git tag vX.Y.Z && git push origin vX.Y.Z). Aucune action automatique
# sur push de branche ou pull request.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          # Renoise's <Version> field requires a parseable float (the
          # official ExampleTool uses "1.2"); we accept either "X.Y" or
          # "X.Y.Z" tags and pass the string through unchanged.
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::tag '$tag' must be vX.Y or vX.Y.Z"
            exit 1
          fi
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check manifest version matches the tag
        run: |
          file="renoise/com.timox.td3-renoise.xrnx/manifest.xml"
          want="${{ steps.version.outputs.version }}"
          if ! grep -q "<Version>$want</Version>" "$file"; then
            echo "::error::$file does not declare <Version>$want</Version>; bump it before tagging"
            grep "<Version>" "$file" || true
            exit 1
          fi

      - name: Build the .xrnx archive
        id: build
        run: |
          out="td3-renoise-${{ steps.version.outputs.tag }}.xrnx"
          cd renoise/com.timox.td3-renoise.xrnx
          zip -r "../../$out" . -x "*.DS_Store"
          cd ../..
          ls -la "$out"
          echo "xrnx_path=$out" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.xrnx_path }}
