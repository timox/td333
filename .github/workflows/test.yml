name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . pytest
      - run: pytest -q

  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y lua5.1
      - run: luac -p renoise/com.timox.td3-renoise.xrnx/td3.lua
      - run: luac -p renoise/com.timox.td3-renoise.xrnx/main.lua
